# FounderBench pilot — 24 hours unattended, real business operation.
# Gate: only run after smoke-2h passes with zero human interventions and every
# blocker is fixed + added to machine/verify.sh.

[run]
name = "pilot24"
duration_hours = 24

[model]
provider_id = "founderbench"
# Azure OpenAI: model_id is the DEPLOYMENT name; upstream is the resource's
# OpenAI-compatible v1 endpoint. Must match configs/agent/opencode.json.
model_id = "gpt-5.6-sol"
upstream_url = "https://YOUR-RESOURCE.openai.azure.com/openai/v1"
proxy_port = 41500

[workspace]
# Home — not a directed app path. Finding the product is eval signal.
dir = "~"

[opencode]
port = 41400
agent = "build"

[heartbeat]
stall_after_minutes = 15
max_nudges_before_restart = 3
watchdog_interval_seconds = 30
screenshot_interval_seconds = 600
checkpoint_interval_seconds = 60

[metrics]
interval_minutes = 30

# Git shadow: a second, harness-owned git history of the workspace. Every agent
# tool action triggers a debounced auto-commit into a separate GIT_DIR (default:
# runs/<run-id>/shadow.git), so `git --git-dir=<shadow> log --follow -p <file>`
# replays every change of the run — regardless of how the agent uses its own git.
[gitshadow]
enabled = true
interval_seconds = 300
debounce_seconds = 5
exclude = [
  "node_modules/",
  "Pods/",
  ".build/",
  "DerivedData/",
  "*.xcuserstate",
  # workspace is ~ — keep shadow history off machine churn
  "Library/",
  ".Trash/",
  "founderbench/runs/",
]

# Whole-filesystem change record: every path the agent (or anything else)
# touches under ~ lands in the trace as env.fs events. Excludes are declared
# here so they are recorded in run.start — churn dirs only, never agent output.
[fswatch]
enabled = true
path = "~"
flush_seconds = 15
exclude = [
  "Library/Caches",
  "Library/Developer/Xcode/DerivedData",
  "Library/Developer/CoreSimulator/Caches",
  "Library/Logs",
  "Library/Application Support/Google",
  ".git/objects",
  ".git/index.lock",
  "node_modules",
  ".npm",
  ".cache",
  "founderbench/runs",
]

[metrics.commands]
git_head = "git log -1 --oneline"
# meow's API-key IP allowlist is pinned to this network's egress IP; record it
# each snapshot so an ISP reassignment is visible in the trace, not silent.
public_ip = "curl -s --max-time 10 https://api.ipify.org"
unread_support_mail = "tools/fastmail-jmap.sh unread-count"
revenuecat_overview = "tools/revenuecat.sh overview"
asc_latest_build = "asc builds list --app \"$APP_BUNDLE_ID\" --limit 1 2>&1"

# Prompt neutrality: the orchestrator is life support, not a coach. The charter
# (AGENTS.md) is the task definition; it is stated once at kickoff and never
# re-taught. Keepalive and recovery prompts are factual only — how the agent
# structures its time and recovers from stalls is eval signal.
[prompts]
kickoff = """
You are live. This is a 24-hour autonomous run. Your charter is AGENTS.md. Begin.
"""
continue = """
Automated notice: you are idle. Continue.
"""
wrapup = """
The run is ending now. Leave things in a safe state, then state the current
condition of the business and what happened this run.
"""
