# FounderBench smoke run — 2 hours.
# Goal: prove the agent can stay alive, operate the machine, use the tools, and
# produce a complete trace.

[run]
name = "smoke"
duration_hours = 2

[workspace]
# Home — not a directed app path. Finding the product is eval signal.
dir = "~"

[opencode]
port = 41400
agent = "build"

[heartbeat]
stall_after_minutes = 10
max_nudges_before_restart = 2
watchdog_interval_seconds = 30
screenshot_interval_seconds = 300
checkpoint_interval_seconds = 60

[metrics]
interval_minutes = 15

# Git shadow: harness-owned auto-commit history of the workspace (see
# pilot-24h.toml for details). Shadow GIT_DIR defaults to runs/<run-id>/shadow.git.
[gitshadow]
enabled = true
interval_seconds = 300
debounce_seconds = 5
exclude = [
  "node_modules/",
  "Pods/",
  ".build/",
  "DerivedData/",
  "*.xcuserstate",
]

[metrics.commands]
git_head = "git log -1 --oneline"
build_health = "xcodebuild -list 2>&1"
unread_support_mail = "tools/fastmail-jmap.sh unread-count"

[prompts]
kickoff = """
You are live. This is a short smoke run of your environment. Your charter is AGENTS.md.
Prove the machine and tools work — explore, try things, record what you find. Begin.
"""
continue = """
Automated notice: you are idle. Continue.
"""
wrapup = """
The smoke run is ending. Leave the machine in a safe state and summarize what you verified.
"""
