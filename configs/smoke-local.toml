# FounderBench local orchestrator smoke — ~10 minutes on a dev Mac, no mini.
# Goal: exercise the orchestrator's full run loop against a throwaway workspace:
# session creation, idle re-prompt injection, checkpoint writes, budget events,
# and a clean wall-clock run.end. No MCPs, no business tools, no watchdog/TCC.
#
# Usage:
#   git init a throwaway repo (e.g. /tmp/fb-orch-smoke) containing an
#   opencode.json that points provider baseURL at http://127.0.0.1:41500/v1,
#   set workspace.dir below, export MODEL_API_KEY, then:
#     npm run orchestrator -- --config configs/smoke-local.toml

[run]
name = "smoke-local"
duration_hours = 0.15          # ~9 minutes
wrapup_minutes = 2

[model]
provider_id = "founderbench"
# Azure OpenAI: model_id is the DEPLOYMENT name; upstream is the resource's
# OpenAI-compatible v1 endpoint.
model_id = "gpt-5.2"
upstream_url = "https://YOUR-RESOURCE.openai.azure.com/openai/v1"
proxy_port = 41500

[workspace]
dir = "/tmp/fb-orch-smoke"

[opencode]
port = 41400
agent = "build"

[heartbeat]
stall_after_minutes = 4
max_nudges_before_restart = 2
# Watchdog + periodic screenshots need TCC grants that only exist on the mini;
# effectively disabled here (one screenshot is still attempted at run end).
watchdog_interval_seconds = 3600
screenshot_interval_seconds = 3600
checkpoint_interval_seconds = 60

[budget]
max_token_spend_usd = 1
input_cost_per_mtok = 0.6
output_cost_per_mtok = 2.2
max_business_spend_usd = 0

[metrics]
interval_minutes = 3

# Exercise the fs watcher locally, scoped to the throwaway workspace.
[fswatch]
enabled = true
path = "/tmp/fb-orch-smoke"
flush_seconds = 10
exclude = [".git/objects", ".git/index.lock"]

[metrics.commands]
git_head = "git log -1 --oneline"

[prompts]
kickoff = """
This is a short orchestrator smoke run in a throwaway workspace. Read AGENTS.md.
Then: append a timestamped entry to SMOKE_REPORT.md noting the run has started
and listing the files in this workspace, and commit it. Keep the turn short and
then stop.
"""
continue = """
Heartbeat: you are idle. Append one more timestamped entry to SMOKE_REPORT.md
(a short fun fact is fine), commit it, then stop.
"""
wrapup = """
The smoke run is ending. Append a final timestamped entry to SMOKE_REPORT.md
summarizing how many entries you made, commit it, and stop.
"""
